<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benchmark Adapter UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .progress-bar-fill {
            transition: width 0.4s ease-in-out;
            background: linear-gradient(90deg, #10b981, #06b6d4, #8b5cf6);
            background-size: 200% 100%;
            animation: shimmer 2s ease-in-out infinite;
        }
        @keyframes shimmer { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        .log-entry { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        #logPanel::-webkit-scrollbar { width: 6px; }
        #logPanel::-webkit-scrollbar-track { background: transparent; }
        #logPanel::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    </style>
</head>
<body class="min-h-screen p-8">

    <div class="max-w-5xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-2">
                Inventory Adapter Benchmark
            </h1>
            <p class="text-slate-400">Ambiente de Teste Isolado In-Cluster (Zero Host NAT Overhead)</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="glass-panel p-6 rounded-xl col-span-1 md:col-span-3 lg:col-span-1 flex flex-col justify-center">
                <h2 class="text-xl font-semibold mb-4 text-emerald-400">Controles</h2>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-slate-300 mb-1">Modo de Avaliação</label>
                    <select id="mode" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-2.5 text-slate-200 outline-none focus:border-emerald-500 transition-colors">
                        <option value="requests">Fase 1: Requests Fixas</option>
                        <option value="timed">Fase 2: Timed Test (10s)</option>
                    </select>
                </div>

                <div class="mt-auto pt-4">
                    <button id="runBtn" onclick="runBenchmark()" class="w-full relative group overflow-hidden bg-gradient-to-br from-emerald-500 to-teal-700 text-white font-semibold py-3 px-4 rounded-lg shadow-lg hover:shadow-emerald-500/30 transition-all duration-300 transform hover:-translate-y-0.5">
                        <span id="btnText" class="relative z-10 flex items-center justify-center">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            INICIAR BENCHMARK
                        </span>
                        <div class="absolute inset-0 h-full w-full scale-0 rounded-lg transition-all duration-300 group-hover:scale-100 group-hover:bg-white/20"></div>
                    </button>
                </div>
            </div>

            <div class="glass-panel p-6 rounded-xl col-span-1 md:col-span-2 relative overflow-hidden h-full min-h-[300px]" id="resultContainer">
                <!-- Empty State -->
                <div id="emptyState" class="absolute inset-0 flex flex-col items-center justify-center text-slate-500">
                    <svg class="w-16 h-16 mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                    <p>Aguardando execução para extrair as métricas...</p>
                </div>

                <!-- Progress State (SSE live) -->
                <div id="progressState" class="hidden h-full flex flex-col">
                    <!-- Progress Bar -->
                    <div class="mb-4">
                        <div class="flex justify-between items-center mb-2">
                            <span id="progressLabel" class="text-sm font-medium text-emerald-400">Iniciando...</span>
                            <span id="progressPercent" class="text-sm font-mono text-slate-400">0%</span>
                        </div>
                        <div class="w-full bg-slate-800 rounded-full h-2.5 overflow-hidden">
                            <div id="progressBar" class="progress-bar-fill h-full rounded-full" style="width: 0%"></div>
                        </div>
                    </div>

                    <!-- Live Log Panel -->
                    <div id="logPanel" class="flex-1 bg-slate-900/80 rounded-lg p-4 overflow-y-auto font-mono text-xs text-slate-400 border border-slate-700/50 space-y-1 max-h-[400px]">
                        <div class="log-entry text-slate-500">Aguardando eventos do servidor...</div>
                    </div>
                </div>

                <!-- Results State -->
                <div id="dataState" class="hidden h-full overflow-y-auto pr-2 pb-4">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold text-white">Resultados da Execução</h2>
                        <span id="timestampBadge" class="text-xs bg-slate-800 text-slate-400 px-3 py-1 rounded-full border border-slate-700"></span>
                    </div>

                    <div id="dynamicCards" class="space-y-6">
                        <!-- Cards renderizados via JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let eventSource = null;

        function setUIState(state) {
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('progressState').classList.add('hidden');
            document.getElementById('dataState').classList.add('hidden');
            if (state === 'empty') document.getElementById('emptyState').classList.remove('hidden');
            if (state === 'progress') document.getElementById('progressState').classList.remove('hidden');
            if (state === 'data') document.getElementById('dataState').classList.remove('hidden');
        }

        function setButtonEnabled(enabled) {
            const btn = document.getElementById('runBtn');
            btn.disabled = !enabled;
            if (enabled) {
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            } else {
                btn.classList.add('opacity-50', 'cursor-not-allowed');
            }
        }

        function updateProgress(step, totalSteps, label) {
            const pct = totalSteps > 0 ? Math.round((step / totalSteps) * 100) : 0;
            document.getElementById('progressBar').style.width = pct + '%';
            document.getElementById('progressPercent').innerText = pct + '%';
            if (label) document.getElementById('progressLabel').innerText = label;
        }

        function addLog(text, color) {
            const panel = document.getElementById('logPanel');
            const entry = document.createElement('div');
            entry.className = 'log-entry ' + (color || 'text-slate-400');
            entry.innerText = text;
            panel.appendChild(entry);
            panel.scrollTop = panel.scrollHeight;
        }

        function formatProgressEvent(data) {
            const evt = data.event;
            switch (evt) {
                case 'start':
                    return { label: 'Iniciando benchmark...', log: `🚀 Benchmark iniciado — modo: ${data.mode}, ${data.total_steps} steps`, color: 'text-emerald-400' };
                case 'warmup_start':
                    return { label: 'Warmup dos endpoints...', log: '🔥 Warmup iniciado', color: 'text-amber-400' };
                case 'warmup_endpoint':
                    return { log: `  ↳ Warmup: ${data.endpoint}`, color: 'text-slate-500' };
                case 'warmup_done':
                    return { log: '  ✅ Warmup concluído', color: 'text-emerald-400' };
                case 'phase_start':
                    const phaseLabel = data.phase === 'requests' ? `Fase 1: Requests Fixas (${data.total_requests || ''})` : `Fase 2: Timed (${data.timed_duration || ''}s)`;
                    return { label: phaseLabel, log: `\n📊 ${phaseLabel}`, color: 'text-blue-400' };
                case 'endpoint_start':
                    return { label: `c=${data.concurrency} → ${data.endpoint}`, log: `  → [c=${data.concurrency}] ${data.endpoint}...`, color: 'text-slate-300' };
                case 'endpoint_done':
                    return { log: `    ✓ ${data.rps} req/s · ${data.latency_ms}ms avg`, color: 'text-emerald-300' };
                case 'phase_complete':
                    return { log: `\n✅ Fase ${data.phase} concluída`, color: 'text-emerald-400' };
                case 'done':
                    return { label: 'Benchmark completo!', log: '\n🏁 Benchmark finalizado com sucesso!', color: 'text-emerald-400' };
                default:
                    return { log: JSON.stringify(data), color: 'text-slate-500' };
            }
        }

        function runBenchmark() {
            if (eventSource) {
                eventSource.close();
                eventSource = null;
            }

            const mode = document.getElementById('mode').value;

            // Reset UI
            setUIState('progress');
            setButtonEnabled(false);
            document.getElementById('logPanel').innerHTML = '';
            updateProgress(0, 1, 'Conectando ao servidor...');

            const params = new URLSearchParams({
                mode: mode,
                requests: 5000,
                timed_duration: 10,
                concurrencies: '1,10,50,100,500'
            });

            eventSource = new EventSource(`/api/run-stream?${params}`);
            let totalSteps = 1;

            eventSource.addEventListener('progress', (e) => {
                try {
                    const data = JSON.parse(e.data);
                    if (data.total_steps) totalSteps = data.total_steps;

                    const step = data.step || 0;
                    const fmt = formatProgressEvent(data);

                    if (fmt.label) updateProgress(step, totalSteps, fmt.label);
                    else updateProgress(step, totalSteps);

                    if (fmt.log) addLog(fmt.log, fmt.color);
                } catch (err) {
                    console.error('Parse error:', err);
                }
            });

            eventSource.addEventListener('result', (e) => {
                try {
                    const data = JSON.parse(e.data);
                    renderResults(data);
                    setUIState('data');
                } catch (err) {
                    console.error('Result parse error:', err);
                }
                eventSource.close();
                eventSource = null;
                setButtonEnabled(true);
            });

            // Modo "all" retorna dois resultados separados
            eventSource.addEventListener('result_requests', (e) => {
                try {
                    const data = JSON.parse(e.data);
                    renderResults(data);
                } catch (err) {
                    console.error('Result parse error:', err);
                }
            });

            eventSource.addEventListener('result_timed', (e) => {
                try {
                    const data = JSON.parse(e.data);
                    renderResults(data);
                    setUIState('data');
                } catch (err) {
                    console.error('Result parse error:', err);
                }
                eventSource.close();
                eventSource = null;
                setButtonEnabled(true);
            });

            eventSource.addEventListener('error', (e) => {
                try {
                    const data = JSON.parse(e.data);
                    addLog(`❌ Erro: ${data.error}`, 'text-red-400');
                } catch (_) {
                    addLog('❌ Conexão perdida com o servidor', 'text-red-400');
                }
                eventSource.close();
                eventSource = null;
                setButtonEnabled(true);
            });

            eventSource.onerror = () => {
                // EventSource's built-in error — stream ended or network issue
                // Only handle if we haven't already received result
                if (eventSource) {
                    eventSource.close();
                    eventSource = null;
                    setButtonEnabled(true);
                }
            };
        }

        function renderResults(data) {
            document.getElementById('timestampBadge').innerText = data.timestamp;
            const container = document.getElementById('dynamicCards');
            container.innerHTML = '';

            const results = data.results;
            const concurrencies = data.config.concurrency_levels;
            const endpoints = [
                {id: 'nginx_proxy', name: 'Nginx Proxy'},
                {id: 'javalin_proxy', name: 'Javalin Proxy'}
            ];

            concurrencies.forEach(c => {
                let html = `<div class="bg-slate-800/50 rounded-lg p-5 border border-slate-700/50">
                    <h3 class="text-slate-200 font-bold border-b border-slate-700 pb-2 mb-4">Concurrency Level: <span class="text-emerald-400">${c}</span></h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">`;

                const baselineKey = `baseline_c${c}`;
                const baselineData = results[baselineKey];

                if (!baselineData) {
                    html += `<p class="text-red-400 text-sm col-span-2">Falha global para o baseline.</p></div></div>`;
                    container.innerHTML += html;
                    return;
                }

                endpoints.forEach(ep => {
                    const proxyKey = `${ep.id}_c${c}`;
                    const proxyData = results[proxyKey];
                    
                    if(proxyData) {
                        const overhead = (proxyData.time_per_request - baselineData.time_per_request).toFixed(2);
                        const rpsDiff = (((proxyData.rps - baselineData.rps) / baselineData.rps) * 100).toFixed(1);
                        const colorClass = ep.id === 'nginx_proxy' ? 'text-blue-400' : 'text-purple-400';
                        
                        html += `
                        <div class="bg-slate-900/80 rounded p-4 border border-slate-700">
                            <div class="flex justify-between mb-2">
                                <span class="font-medium text-sm text-slate-300">${ep.name}</span>
                                <span class="text-xs px-2 py-0.5 rounded bg-slate-800 text-slate-400">vs Baseline</span>
                            </div>
                            
                            <div class="flex justify-between items-end mb-2">
                                <div>
                                    <div class="text-2xl font-bold ${colorClass}">${proxyData.rps.toFixed(0)} <span class="text-xs text-slate-500">req/s</span></div>
                                </div>
                                <div class="text-right">
                                    <div class="text-xs ${rpsDiff < 0 ? 'text-red-400' : 'text-emerald-400'}">${rpsDiff}%</div>
                                </div>
                            </div>
                            
                            <div class="space-y-1 mt-3 text-xs text-slate-400">
                                <div class="flex justify-between">
                                    <span>Latência Média:</span>
                                    <span class="text-slate-200">${proxyData.time_per_request.toFixed(2)} ms</span>
                                </div>
                                <div class="flex justify-between">
                                    <span>P99 (Tail):</span>
                                    <span class="text-slate-200">${proxyData.p99} ms</span>
                                </div>
                                <div class="flex justify-between border-t border-slate-700 pt-1 mt-1 font-semibold">
                                    <span>Overhead Interno:</span>
                                    <span class="${overhead > 5 ? 'text-amber-400' : 'text-emerald-400'}">+${overhead} ms</span>
                                </div>
                            </div>
                        </div>`;
                    }
                });
                
                html += `</div></div>`;
                container.innerHTML += html;
            });
        }
    </script>
</body>
</html>
