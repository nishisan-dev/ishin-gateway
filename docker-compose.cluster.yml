# docker-compose.cluster.yml
# Profile cluster para benchmark: 3 nós Ishin Gateway com NGrid mesh + nginx LB
#
# Uso:
#   docker compose -f docker-compose.yml -f docker-compose.cluster.yml up -d
#
# Para bench mode (sem tracing, log INFO):
#   docker compose -f docker-compose.yml -f docker-compose.bench.yml -f docker-compose.cluster.yml up -d
#
# Cenários de benchmark:
#   1. baseline        → nginx direto (static-backend:8080)
#   2. nginx_proxy     → nginx-proxy → static-backend (como standalone)
#   3. javalin_proxy   → ishin-node1 direto (nó primário))
#   4. cluster_node2   → ishin-node2 direto (nó secundário)
#   5. cluster_node3   → ishin-node3 direto (nó secundário)
#   6. cluster_lb      → nginx round-robin → 3 nós Ishin Gateway
#
# Portas expostas:
#   - 5080: nginx LB (round-robin → 3 nós Ishin Gateway)
#   - 9191/9192/9193: cada nó Ishin Gateway diretamente (listener http-noauth)
#   - 9291/9292/9293: Actuator health de cada nó
#
services:
  # --- Desabilitar o serviço ishin-gateway standalone (0 réplicas) ---
  ishin-gateway:
    deploy:
      replicas: 0

  # --- Load Balancer nginx (round-robin para os 3 nós) ---
  nginx-cluster-lb:
    image: nginx:alpine
    volumes:
      - ./compose/nginx-cluster/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "5080:8080"
    depends_on:
      - ishin-node1
      - ishin-node2
      - ishin-node3
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 2s
      retries: 3

  # --- Nó 1 (base template via YAML anchor) ---
  ishin-node1: &ishin-node
    image: maven:3.9.9-eclipse-temurin-21
    working_dir: /workspace
    depends_on:
      - static-backend
    environment: &ishin-env
      SPRING_PROFILES_DEFAULT: bench
      ISHIN_CONFIG: /workspace/config/adapter-cluster.yaml
      TRACING_ENABLED: "false"
      MAVEN_CONFIG: /tmp/.m2
      ISHIN_CLUSTER_NODE_ID: "ishin-node1"
    volumes: &ishin-volumes
      - ./:/workspace
      - maven-cache:/tmp/.m2
      - ~/.m2/settings.xml:/tmp/maven-settings.xml:ro
    command: &ishin-cmd
      - /bin/bash
      - -lc
      - mvn -s /tmp/maven-settings.xml -DskipTests package -q && java -Dspring.profiles.active=bench -XX:+UseZGC -XX:+ZGenerational -Xms256m -Xmx512m -jar target/ishin-gateway-1.0-SNAPSHOT.jar
    ports:
      - "9191:9091"
      - "9291:9190"

  # --- Nó 2 ---
  ishin-node2:
    <<: *ishin-node
    environment:
      <<: *ishin-env
      ISHIN_CLUSTER_NODE_ID: "ishin-node2"
    ports:
      - "9192:9091"
      - "9292:9190"

  # --- Nó 3 ---
  ishin-node3:
    <<: *ishin-node
    environment:
      <<: *ishin-env
      ISHIN_CLUSTER_NODE_ID: "ishin-node3"
    ports:
      - "9193:9091"
      - "9293:9190"

  # --- Benchmark UI: aponta para nós de cluster ---
  benchmark-ui:
    environment:
      JAVALIN_PROXY_URL: "http://ishin-node1:9091/"
      CLUSTER_NODE1_URL: "http://ishin-node1:9091/"
      CLUSTER_NODE2_URL: "http://ishin-node2:9091/"
      CLUSTER_NODE3_URL: "http://ishin-node3:9091/"
      CLUSTER_LB_URL: "http://nginx-cluster-lb:8080/"
    depends_on:
      - static-backend
      - nginx-cluster-lb
      - ishin-node1
      - ishin-node2
      - ishin-node3
