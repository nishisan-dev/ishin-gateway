---
# ishin-gateway — Default Docker Configuration
# This config is embedded in the Docker image and provides a minimal
# working setup. Override by mounting your own adapter.yaml:
#   -v $(pwd)/adapter.yaml:/app/config/adapter.yaml:ro

endpoints:
  default:
    listeners:
      http:
        listenAddress: "0.0.0.0"
        listenPort: 9091
        ssl: false
        scriptOnly: false
        defaultBackend: "backend-1"
        secured: false
        urlContexts:
          default:
            context: "/*"
            method: "ANY"
            ruleMapping: "default/Rules.groovy"

    backends:
      backend-1:
        backendName: "backend-1"
        members:
          - url: "http://localhost:8080"

    ruleMapping: "default/Rules.groovy"
    ruleMappingThreads: 1
    socketTimeout: 30

    # Jetty Thread Pool
    jettyMinThreads: 16
    jettyMaxThreads: 500
    jettyIdleTimeout: 120000

    # OkHttp Connection Pool
    connectionPoolSize: 256
    connectionPoolKeepAliveMinutes: 5

    # OkHttp Dispatcher
    dispatcherMaxRequests: 512
    dispatcherMaxRequestsPerHost: 256
